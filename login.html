<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="utf-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no">
    <title>Agromundo - Login</title>

    <link href="vendor/fontawesome-free/css/all.min.css" rel="stylesheet" type="text/css">
    <link href="https://fonts.googleapis.com/css?family=Nunito:200,200i,300,300i,400,400i,600,600i,700,700i,800,800i,900,900i" rel="stylesheet">
    <link href="css/sb-admin-2.min.css" rel="stylesheet">

    <style>
        body {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }
    </style>
</head>

<body class="bg-gradient-primary">

    <div class="card o-hidden border-0 shadow-lg" style="max-width: 600px; width: 100%; margin: 20px;">
        <div class="card-body p-5">
            <div class="text-center">
                <img src="img/logo_agromundo.png" alt="Logo Agromundo" class="mb-4" style="max-height: 120px;">
                
                <form class="user" id="formLogin">
                    <div class="form-group">
                        <input type="email" class="form-control form-control-user" id="exampleInputEmail" placeholder="Correo electrónico" required style="text-align: center;">
                    </div>

                    <div class="form-group">
                        <input type="password" class="form-control form-control-user" id="exampleInputPassword" placeholder="Contraseña" required style="text-align: center;">
                    </div>

                    <button type="submit" class="btn btn-primary btn-user btn-block">
                        Iniciar Sesión
                    </button>

                    <p id="mensajeLogin" class="text-center mt-3 mb-0 small"></p>
                </form>
            </div>
        </div>
    </div>

    <script src="vendor/jquery/jquery.min.js"></script>
    <script src="vendor/bootstrap/js/bootstrap.bundle.min.js"></script>
    <script src="vendor/jquery-easing/jquery.easing.min.js"></script>
    <script src="js/sb-admin-2.min.js"></script>
    <script src="js/login.js"></script>
</body>

</html>
